<!DOCTYPE html>
<html>

<head>
    <title>Maintenance</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Menu</h2>

        <a href="admin-dashboard.html">Dashboard</a>
        <a href="employees.html">Employees</a>
        <a href="assets.html">Assets</a>
        <a href="vendors.html">Vendors</a>
        <a href="categories.html">Categories</a>
        <a href="allocations.html">Allocations</a>
        <a href="maintenance.html">Maintenance</a>

        <a onclick="logout()">Logout</a>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <h1>Maintenance</h1>

        <div id="message" class="message"></div>

        <button class="btn" onclick="openForm()">+ Add Maintenance</button>

        <br><br>

        <table id="maintTable" width="100%">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Asset ID</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Created At</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>

    </div>
</div>

<!-- POPUP -->
<div id="maintForm" class="modal">

    <div class="modal-content">

        <h2 id="formTitle">Add Maintenance</h2>

        <div id="modalMessage" class="message"></div>

        <input id="assetId" placeholder="Asset ID">
        <input id="description" placeholder="Description">

        <select id="status">
            <option value="OPEN">OPEN</option>
            <option value="IN_PROGRESS">IN_PROGRESS</option>
            <option value="RESOLVED">RESOLVED</option>
        </select>

        <label>Created At</label>
        <input type="datetime-local" id="createdAt">

        <div style="display:flex;justify-content:space-between;">
            <button class="btn" onclick="saveMaintenance()">Save</button>
            <button class="btn" style="background:#6b7280;" onclick="closeForm()">Cancel</button>
        </div>

    </div>

</div>

<script src="../js/maintenance-api.js"></script>

</body>
</html>
