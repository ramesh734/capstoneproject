</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Menu</h2>

        <a href="admin-dashboard.html">Dashboard</a>
        <a href="employees.html">Employees</a>

    <!-- CONTENT -->
    <div class="content">

        <h1>Categories</h1>

        <div id="message" class="message"></div>

        <button class="btn" onclick="openForm()">
            + Add Category
        </button>

        <br><br>

       <table id="categoryTable" width="100%">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

    </div>

<!-- POPUP -->
<div id="categoryForm" class="modal">

    <div class="modal-content">

        <h2 id="formTitle">Add Category</h2>

        <div id="modalMessage" class="message"></div>

        <input id="name" placeholder="Category Name">
     
     

        <div style="display:flex;justify-content:space-between;">
            <button class="btn" onclick="saveCategory()">Save</button>
            <button class="btn" style="background:#6b7280;" onclick="closeForm()">Cancel</button>
        </div>

    </div>

</div>

<script src="../js/category-api.js"></script>
