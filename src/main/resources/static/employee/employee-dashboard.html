<!DOCTYPE html>
<html>

<head>
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
 <div class="sidebar">

    <h2>Employee Panel</h2>

    <a class="active" href="employee-dashboard.html">Dashboard</a>

    <a href="my-assets.html">My Assets</a>

    <a href="my-requests.html">Maintenance</a>

    <a href="profile.html">Profile</a>

    <a href="#" onclick="logout()">Logout</a>

</div>

    <!-- CONTENT -->
    <div class="content">

       <h1 >Welcome
       <span id="employeeName"></span>
       
       </h1>

        <!-- CARDS -->
        <div style="display:flex; gap:20px; margin-top:20px;">

            <div class="card">
                <h3> Allocated Assets</h3>
                <h2 id="assetCount">0</h2>
            </div>

            <div class="card">
                <h3>Available Assets</h3>
                <h2 id="allocCount">0</h2>
            </div>

            <div class="card">
                <h3>Maintenance Requests</h3>
                <h2 id="maintCount">0</h2>
            </div>

        </div>

        <br><br>

        <!-- QUICK TABLE -->
        <h2>Recent Allocations</h2>

        <table width="100%" id="allocTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Asset ID</th>
                    <th>Status</th>
                    <th>Return Date</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>

    </div>
</div>

<script src="../js/employee-dashboard.js"></script>

</body>

</html>
